  <line x1="60" y1="58" x2="74" y2="64" stroke="#7fdce6" stroke-width="3" stroke-linecap="round"/>
  <circle cx="60" cy="58" r="3.5" fill="#ffffff"/>
  <!-- waves -->
  <path d="M22 92 q9 -8 18 0 t18 0 t18 0 t18 0" stroke="#7fdce6" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.9"/>
  <path d="M26 102 q9 -7 17 0 t17 0 t17 0 t17 0" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.65"/>
  <text x="60" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="0" fill="#ffffff">LP</text>
</svg>
