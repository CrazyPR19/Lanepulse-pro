<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="lpGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1f3a"/>
      <stop offset="55%" stop-color="#0e3a6b"/>
      <stop offset="100%" stop-color="#1f9fbf"/>
    </linearGradient>
    <linearGradient id="lpAqua" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#1f9fbf"/>
      <stop offset="100%" stop-color="#7fdce6"/>
    </linearGradient>
  </defs>
  <rect x="6" y="6" width="108" height="108" rx="26" fill="url(#lpGrad)"/>
  <!-- stopwatch ring -->
  <circle cx="60" cy="58" r="30" fill="none" stroke="#ffffff" stroke-width="5" opacity="0.95"/>
  <circle cx="60" cy="58" r="30" fill="none" stroke="url(#lpAqua)" stroke-width="5" stroke-dasharray="94 200" stroke-linecap="round" transform="rotate(-90 60 58)"/>
  <!-- top button -->
